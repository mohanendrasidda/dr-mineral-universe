<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;overflow:hidden;background:#888}</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head><body>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const r=new THREE.WebGLRenderer({antialias:true}); r.setSize(innerWidth,innerHeight); r.outputColorSpace=THREE.SRGBColorSpace; document.body.appendChild(r.domElement);
const sc=new THREE.Scene(); sc.background=new THREE.Color(0x7a7a7a);
const cam=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.01,1000);
sc.add(new THREE.HemisphereLight(0xffffff,0x444444,2.0)); const d=new THREE.DirectionalLight(0xffffff,2.2); d.position.set(3,6,4); sc.add(d);
const names=['crystal','gem','blacksmith','column','barrel','rock','torch','lantern'];
const L=new GLTFLoader(); const COLS=4, GAP=2.2;
names.forEach((nm,i)=>{ L.load('../assets/models/props/'+nm+'.glb', g=>{ const o=g.scene;
  const b=new THREE.Box3().setFromObject(o), s=new THREE.Vector3(); b.getSize(s); const sc1=1.4/(Math.max(s.x,s.y,s.z)||1); o.scale.setScalar(sc1);
  const b2=new THREE.Box3().setFromObject(o), c=b2.getCenter(new THREE.Vector3());
  o.position.set((i%COLS - (COLS-1)/2)*GAP - c.x*0, -(Math.floor(i/COLS))*GAP*1.2, 0);
  o.position.x=(i%COLS-(COLS-1)/2)*GAP; o.position.y=-Math.floor(i/COLS)*2.4 + 1; o.position.x-=c.x*sc1*0; sc.add(o);
}); });
cam.position.set(0,0,9); cam.lookAt(0,-0.6,0);
let n=0; (function loop(){ r.render(sc,cam); if(n++<120) requestAnimationFrame(loop); })();
</script>
</body></html>
