<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lab — Dr. Mineral's living blockchain world</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital@0;1&family=Spectral&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#070504;overflow:hidden;font-family:'Spectral',serif;color:#efe3cf}
  #app{position:fixed;inset:0}
  .mono{font-family:'IBM Plex Mono',monospace}
  #hud{position:fixed;top:18px;left:20px;z-index:5;pointer-events:none}
  #hud .kick{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.32em;color:rgba(238,196,126,.8)}
  #hud h1{margin:6px 0 0;font-family:'Cinzel',serif;font-weight:700;font-size:clamp(20px,2.6vw,30px);color:#f6e9d0;letter-spacing:.04em;text-shadow:0 0 30px rgba(245,196,107,.4)}
  #hud .sub{margin-top:5px;font-style:italic;color:rgba(214,199,170,.7);font-size:13px}
  #ctr{position:fixed;top:20px;right:22px;z-index:5;text-align:right;font-family:'IBM Plex Mono',monospace;pointer-events:none}
  #ctr .lab{font-size:10px;letter-spacing:.24em;color:rgba(238,196,126,.75)}
  #ctr .n{font-size:32px;color:#f6c878;text-shadow:0 0 22px rgba(246,196,112,.6);line-height:1}
  #ctr .s2{font-size:10px;letter-spacing:.14em;color:rgba(200,182,150,.6);margin-top:3px}
  #hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:rgba(214,190,150,.55);pointer-events:none}
  #panel{position:fixed;left:50%;bottom:54px;transform:translateX(-50%) translateY(20px);z-index:6;width:min(520px,92vw);
    background:rgba(14,10,7,.82);backdrop-filter:blur(8px);border:1px solid var(--c,rgba(210,170,110,.4));border-radius:12px;padding:22px 26px;
    box-shadow:0 20px 60px -20px #000,0 0 30px -10px var(--c);opacity:0;pointer-events:none;transition:opacity .35s, transform .35s}
  #panel.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #panel .step{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--c,#f0c87e)}
  #panel h2{margin:8px 0 2px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;color:#f5e8d1}
  #panel .mean{margin-top:10px;font-size:15.5px;line-height:1.6;color:rgba(228,215,191,.92)}
  #panel .x{position:absolute;top:12px;right:14px;cursor:pointer;color:rgba(220,200,170,.6);font-size:18px;font-family:'IBM Plex Mono',monospace}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;background:#070504;color:#f0c87e;font-family:'IBM Plex Mono',monospace;letter-spacing:.2em;font-size:12px;text-align:center;padding:20px}
  a.back{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:rgba(214,190,150,.6);text-decoration:none}
  a.back:hover{color:#f6c878}
</style>
</head>
<body>
<div id="loading">WAKING THE LAB…</div>
<div id="app"></div>
<a class="back" href="../index.html">&#8592; BACK TO THE LANDING</a>
<div id="hud"><div class="kick">THE UNIVERSITY OF NEBRASKA LAB</div><h1>THE LIVING CHAIN</h1><div class="sub">click a zone &middot; the lab is always working</div></div>
<div id="ctr"><div class="lab">BLOCKS FORGED</div><div class="n" id="blocks">0</div><div class="s2" id="chainlen">CHAIN 0</div></div>
<div id="hint">DRAG TO ORBIT &middot; SCROLL TO ZOOM &middot; CLICK A GLOWING ZONE</div>
<div id="panel"><span class="x" id="panelx">&#215;</span><div class="step" id="pstep"></div><h2 id="ptitle"></h2><div class="mean" id="pmean"></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

window.addEventListener('error', e=>{ const l=document.getElementById('loading'); if(l){ l.style.display='flex'; l.textContent='⚠ '+(e.message||'error'); } });

const W=()=>innerWidth, H=()=>innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W(),H()); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x050302); scene.fog=new THREE.FogExp2(0x070403,0.028);
// environment map -> real reflections on metal & glass
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.5).texture;
const camera=new THREE.PerspectiveCamera(46,W()/H(),0.1,300); camera.position.set(16,13,19);
const controls=new OrbitControls(camera,renderer.domElement); controls.target.set(0,1.4,0);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.minDistance=8; controls.maxDistance=42; controls.maxPolarAngle=Math.PI*0.485;
controls.autoRotate=true; controls.autoRotateSpeed=0.3;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(W(),H()),0.7,0.9,0.82);
composer.addPass(bloom);

// ---------- lighting (dark cave; the shaft is the drama) ----------
scene.add(new THREE.HemisphereLight(0x2a2016,0x050302,0.34));
const shaftLight=new THREE.SpotLight(0xfff0d0,80,70,Math.PI*0.14,0.55,1.3);
shaftLight.position.set(0,32,0); shaftLight.target.position.set(0,0,0); scene.add(shaftLight); scene.add(shaftLight.target);
shaftLight.castShadow=true; shaftLight.shadow.mapSize.set(2048,2048); shaftLight.shadow.camera.near=4; shaftLight.shadow.camera.far=64; shaftLight.shadow.bias=-0.0006; shaftLight.shadow.radius=4;

// ---------- underground cavern ----------
const floor=new THREE.Mesh(new THREE.CircleGeometry(24,72),new THREE.MeshStandardMaterial({color:0x1c140d,roughness:.95,metalness:0}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
// tall dark cave walls
const wall=new THREE.Mesh(new THREE.CylinderGeometry(24,27,42,64,1,true),new THREE.MeshStandardMaterial({color:0x0d0906,roughness:1,side:THREE.BackSide}));
wall.position.y=16; scene.add(wall);
// rock ceiling dome (closes the cavern)
const dome=new THREE.Mesh(new THREE.SphereGeometry(26,44,24,0,Math.PI*2,0,Math.PI*0.5),new THREE.MeshStandardMaterial({color:0x0b0705,roughness:1,side:THREE.BackSide}));
dome.position.y=11; scene.add(dome);
// the shaft of light from the entrance above — how the lab was found
const shaftCone=new THREE.Mesh(new THREE.ConeGeometry(7.5,32,64,1,true),new THREE.MeshBasicMaterial({color:0xffe9c0,transparent:true,opacity:0.035,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));
shaftCone.position.set(0,16,0); scene.add(shaftCone);
const pool=new THREE.Mesh(new THREE.CircleGeometry(5.5,44),new THREE.MeshBasicMaterial({color:0xffe9c0,transparent:true,opacity:0.10,depthWrite:false,blending:THREE.AdditiveBlending}));
pool.rotation.x=-Math.PI/2; pool.position.y=0.07; scene.add(pool);
// stalactites hanging from the ceiling
for(let i=0;i<18;i++){const a=Math.random()*6.28,r=5+Math.random()*16,h=2+Math.random()*5;
  const m=new THREE.Mesh(new THREE.ConeGeometry(0.4+Math.random()*0.7,h,6),new THREE.MeshStandardMaterial({color:0x120c08,roughness:1}));
  m.position.set(Math.cos(a)*r,21-h/2,Math.sin(a)*r); m.rotation.x=Math.PI; scene.add(m);}
// stalagmites / rock pillars rising near the walls
for(let i=0;i<14;i++){const a=i/14*6.28,r=18+Math.sin(i*2)*2,h=4+Math.random()*9;
  const m=new THREE.Mesh(new THREE.ConeGeometry(1.2+Math.random(),h,6),new THREE.MeshStandardMaterial({color:0x140e09,roughness:1}));
  m.position.set(Math.cos(a)*r,h/2,Math.sin(a)*r); m.rotation.y=Math.random()*3; scene.add(m);}
// bioluminescent crystals embedded in the cave walls
const wallCols=[0xb98cff,0x6fd0ff,0xf6c878,0x7fd1a6];
for(let i=0;i<30;i++){const a=Math.random()*6.28,y=2+Math.random()*16,c=wallCols[i%4];
  const m=new THREE.Mesh(new THREE.OctahedronGeometry(0.25+Math.random()*0.4,0),glassMat(c));
  m.position.set(Math.cos(a)*22.6,y,Math.sin(a)*22.6); m.rotation.set(Math.random()*3,Math.random()*3,0); scene.add(m);}

// ---------- zones ----------
const R=9.2;
const ZONES=[
 {key:'mines',  name:'The Mines',  step:'01 · MINE',   c:0xb98cff, mean:'Where the work happens — finding bugs, running audits, writing it up. Real security work is the lab’s mining.'},
 {key:'foundry',name:'The Foundry',step:'02 · FORGE',  c:0xf2902e, mean:'Verified work is forged into a reward token and welded onto the chain — a permanent, public record.'},
 {key:'ledger', name:'The Ledger', step:'03 · RECORD', c:0x9fc6e8, mean:'Every contribution recorded on-chain, forever. Where reward & bug-bounty winners are honored.'},
 {key:'vault',  name:'The Vault',  step:'04 · SINK',   c:0x6fd0ff, mean:'Mined value is kept here — and the sink the institution controls, so the coin stays healthy.'},
 {key:'watch',  name:'The Watch',  step:'05 · GUARD',  c:0xe2603a, mean:'Slither, Echidna, monitoring. A security-led cohort’s home-field edge: the chain is guarded.'},
];
ZONES.forEach((z,i)=>{ const a=Math.PI/2 - i*(2*Math.PI/5); z.pos=new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R); });
const Z=k=>ZONES.find(z=>z.key===k);

// glowing loop paths between consecutive zones
for(let i=0;i<ZONES.length;i++){ const a=ZONES[i].pos, b=ZONES[(i+1)%ZONES.length].pos;
  const mid=a.clone().add(b).multiplyScalar(0.5); const len=a.distanceTo(b);
  const strip=new THREE.Mesh(new THREE.BoxGeometry(len,0.06,0.5),new THREE.MeshStandardMaterial({color:0x7a5a2a,emissive:0xc8902e,emissiveIntensity:.5,roughness:.6}));
  strip.position.set(mid.x,0.05,mid.z); strip.rotation.y=-Math.atan2(b.z-a.z,b.x-a.x); scene.add(strip); }

// zone platforms + lights + props
const picker=[];
ZONES.forEach(z=>{
  const plat=new THREE.Mesh(new THREE.CylinderGeometry(2.5,2.8,0.5,40),new THREE.MeshStandardMaterial({color:0x2c2118,roughness:.9}));
  plat.position.copy(z.pos); plat.position.y=0.25; scene.add(plat);
  plat.userData.zone=z; picker.push(plat);
  const pl=new THREE.PointLight(z.c,16,18,2); pl.position.copy(z.pos); pl.position.y=2.6; scene.add(pl); z.light=pl;
});
const cMat=c=>new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:1.0,roughness:.3,metalness:.2});
const glassMat=c=>new THREE.MeshPhysicalMaterial({color:c,emissive:c,emissiveIntensity:.5,metalness:0,roughness:.05,transmission:.92,ior:1.8,thickness:1.4,transparent:true,envMapIntensity:1.3});
function octo(p,c,h,y){const m=new THREE.Mesh(new THREE.OctahedronGeometry(h,0),glassMat(c)); m.position.set(p.x,(y||h*0.9),p.z); m.castShadow=true; scene.add(m); return m;}
// Mines: crystal cluster
const mp=Z('mines').pos; const mineCrys=[]; for(let i=0;i<7;i++){const a=i/7*6.28; mineCrys.push(octo(new THREE.Vector3(mp.x+Math.cos(a)*1.5,0,mp.z+Math.sin(a)*1.5),0xb98cff,0.4+Math.random()*0.5));}
// Foundry: forge ring + light
const fp=Z('foundry').pos; const forge=new THREE.Mesh(new THREE.TorusGeometry(1.3,0.34,16,40),new THREE.MeshStandardMaterial({color:0xff8a2a,emissive:0xff7a18,emissiveIntensity:1.5,roughness:.4})); forge.position.set(fp.x,1.3,fp.z); forge.rotation.x=Math.PI/2; scene.add(forge);
const forgeLight=new THREE.PointLight(0xff8a2a,26,16,2); forgeLight.position.set(fp.x,1.7,fp.z); scene.add(forgeLight);
// Ledger: pillar + star (chain grows toward here)
const lp=Z('ledger').pos; const pillar=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,4.2,12),cMat(0x9fc6e8)); pillar.position.set(lp.x,2.1,lp.z); scene.add(pillar);
const star=new THREE.Mesh(new THREE.IcosahedronGeometry(0.42,0),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xbfe0ff,emissiveIntensity:1.8})); star.position.set(lp.x,4.5,lp.z); scene.add(star);
// Vault: pedestal + blue gem
const vp=Z('vault').pos; const ped=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.95,1,16),new THREE.MeshStandardMaterial({color:0x2a2118,roughness:.9})); ped.position.set(vp.x,0.75,vp.z); scene.add(ped); const seed=octo(vp,0x6fd0ff,0.7,1.8);
// Watch: eye
const wp=Z('watch').pos; const eye=new THREE.Mesh(new THREE.TorusGeometry(0.95,0.16,12,32),cMat(0xe2603a)); eye.position.set(wp.x,1.9,wp.z); scene.add(eye); const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.34,16,16),new THREE.MeshStandardMaterial({color:0xffcaa0,emissive:0xff9a60,emissiveIntensity:1.3})); pupil.position.set(wp.x,1.9,wp.z); scene.add(pupil);

// ---------- billboard sprites ----------
const texLoader=new THREE.TextureLoader();
const URLS={
  hero:'../../assets/keyed/char-drmineral-hero-v1.png',
  tally:'../../assets/keyed/char-tally-v1.png',
  vellum:'../../assets/keyed/char-vellum-v1.png',
  walk:'../sprites/walk-a.png',
};
let loaded=0; function ready(){ if(++loaded>=2){ const l=document.getElementById('loading'); if(l&&l.textContent==='WAKING THE LAB…')l.style.display='none'; } }
function sprite(url,h){ const tex=texLoader.load(url,()=>ready()); tex.colorSpace=THREE.SRGBColorSpace;
  const m=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const s=new THREE.Sprite(m); s.scale.set(h,h,1); s.userData.h=h; scene.add(s); return s; }
function flip(s,left){ const m=s.material.map; if(m){ m.repeat.x=left?-1:1; m.offset.x=left?1:0; } }
function setY(s,y){ s.position.y=s.userData.h/2+y; }
// soft contact shadows to ground the billboard characters
const shadowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');const gr=g.createRadialGradient(64,64,2,64,64,62);gr.addColorStop(0,'rgba(0,0,0,.55)');gr.addColorStop(.55,'rgba(0,0,0,.22)');gr.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=gr;g.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);})();
function groundShadow(w){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,w*0.58),new THREE.MeshBasicMaterial({map:shadowTex,transparent:true,depthWrite:false}));m.rotation.x=-Math.PI/2;m.position.y=0.09;scene.add(m);return m;}

// keepers
const drM=sprite(URLS.hero,3.4); drM.position.set(0,0,0); setY(drM,0.05);
const tally=sprite(URLS.tally,2.0); tally.position.set(lp.x+1.6,0,lp.z+0.4); setY(tally,0);
const vellum=sprite(URLS.vellum,1.9); vellum.position.set(vp.x+1.6,0,vp.z+0.2); setY(vellum,0);
// miners at the mines (bob)
const miners=[]; for(let i=0;i<3;i++){ const s=sprite(URLS.walk,1.8); const a=i/3*6.28; s.position.set(mp.x+Math.cos(a)*1.8,0,mp.z+Math.sin(a)*1.8); s.userData.phase=Math.random()*6; miners.push(s); }
// haulers loop Mine -> Foundry carrying a crystal, then back
const haulers=[]; for(let i=0;i<3;i++){ const s=sprite(URLS.walk,1.8); s.userData.t=i*0.66; haulers.push({s, crystal: octo(mp,0xd9b3ff,0.26,1.1), prev:0}); }
// contact shadows for every character
const shadowed=[drM,tally,vellum,...miners,...haulers.map(h=>h.s)];
const shadows=shadowed.map(s=>groundShadow(s.userData.h*0.95));

// ---------- the growing chain (Foundry -> Ledger) ----------
const chain=new THREE.Group(); scene.add(chain);
const chainMat=new THREE.MeshStandardMaterial({color:0xf7cf86,emissive:0xc8902e,emissiveIntensity:.3,metalness:1.0,roughness:.22,envMapIntensity:1.4});
const flyers=[]; // blocks traveling forge->ledger
let blocks=0; const CAP=22;
function forgeBlock(){ blocks++; document.getElementById('blocks').textContent=blocks;
  const cube=new THREE.Mesh(new THREE.TorusGeometry(0.32,0.12,10,20),chainMat); cube.rotation.x=Math.PI/2; cube.position.set(fp.x,1.1,fp.z); scene.add(cube);
  flyers.push({m:cube,t:0}); }
function landBlock(cube){ if(chain.children.length>=CAP){ scene.remove(cube); document.getElementById('chainlen').textContent='CHAIN '+chain.children.length; return; }
  const i=chain.children.length, t=i/(CAP-1); const p=new THREE.Vector3().lerpVectors(fp,lp,t*0.92);
  cube.position.set(p.x,1.0,p.z); cube.rotation.z=(i%2)*Math.PI/2; chain.add(cube); document.getElementById('chainlen').textContent='CHAIN '+chain.children.length; }

// ---------- dust motes ----------
const dustN=160, dpos=new Float32Array(dustN*3);
for(let i=0;i<dustN;i++){ dpos[i*3]=(Math.random()-0.5)*44; dpos[i*3+1]=Math.random()*16; dpos[i*3+2]=(Math.random()-0.5)*44; }
const dust=new THREE.Points(new THREE.BufferGeometry().setAttribute('position',new THREE.BufferAttribute(dpos,3)),
  new THREE.PointsMaterial({color:0xf6c878,size:0.07,transparent:true,opacity:0.55,depthWrite:false}));
scene.add(dust);

// ---------- click to focus ----------
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2(); let focus=null, downXY=null;
const panel=document.getElementById('panel');
function openZone(z){ focus=z; panel.style.setProperty('--c','#'+z.c.toString(16).padStart(6,'0'));
  document.getElementById('pstep').textContent=z.step; document.getElementById('ptitle').textContent=z.name; document.getElementById('pmean').textContent=z.mean;
  panel.classList.add('on'); controls.autoRotate=false; }
function closeZone(){ focus=null; panel.classList.remove('on'); controls.autoRotate=true; }
document.getElementById('panelx').addEventListener('click',closeZone);
renderer.domElement.addEventListener('pointerdown',e=>{ downXY=[e.clientX,e.clientY]; });
renderer.domElement.addEventListener('pointerup',e=>{ if(!downXY)return; const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]); downXY=null; if(moved>6)return;
  mouse.x=(e.clientX/W())*2-1; mouse.y=-(e.clientY/H())*2+1; ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(picker)[0]; if(hit&&hit.object.userData.zone) openZone(hit.object.userData.zone); else closeZone(); });

// ---------- loop ----------
const clock=new THREE.Clock();
function lerpV(a,b,t){ return a.clone().lerp(b,t); }
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,clock.getDelta()), t=clock.getElapsedTime();
  // keepers bob
  setY(drM,0.05+Math.sin(t*1.4)*0.06); setY(tally,Math.sin(t*2+1)*0.05);
  // miners bob + occasional dig
  miners.forEach((s,i)=>{ const ph=s.userData.phase; setY(s,Math.abs(Math.sin(t*3+ph))*0.18); flip(s,Math.sin(t*0.6+i)<0); });
  // haulers Mine->Foundry->Mine
  haulers.forEach(h=>{ h.s.userData.t+=dt*0.22; const seg=h.s.userData.t%2; const carry=seg<1;
    const from=carry?mp:fp, to=carry?fp:mp, f=carry?seg:seg-1;
    h.s.position.x=from.x+(to.x-from.x)*f; h.s.position.z=from.z+(to.z-from.z)*f; setY(h.s,Math.abs(Math.sin(t*6))*0.07);
    flip(h.s,(to.x-from.x)<0);
    h.crystal.visible=carry; h.crystal.position.set(h.s.position.x+0.5,1.1,h.s.position.z); h.crystal.rotation.y+=dt*2;
    if(h.prev<1&&seg>=1) forgeBlock(); h.prev=seg; });
  // flying blocks forge->ledger
  for(let i=flyers.length-1;i>=0;i--){ const fl=flyers[i]; fl.t+=dt*0.9; const p=lerpV(fp,lp,Math.min(1,fl.t)); fl.m.position.set(p.x,1.0+Math.sin(fl.t*3)*0.5*(1-fl.t),p.z); fl.m.rotation.y+=dt*3;
    if(fl.t>=1){ landBlock(fl.m); flyers.splice(i,1); } }
  // props
  forge.rotation.z+=dt*0.6; forgeLight.intensity=22+Math.sin(t*4)*7; star.rotation.y+=dt*1.2; star.position.y=4.5+Math.sin(t*2)*0.16;
  seed.rotation.y+=dt*0.8; eye.rotation.z+=dt*0.5; mineCrys.forEach((c,i)=>c.rotation.y+=dt*(0.3+i*0.04));
  ZONES.forEach((z,i)=>z.light.intensity=14+Math.sin(t*2+i)*3);
  chain.children.forEach((l,i)=>l.material&&(l.rotation.y+=dt*0.4));
  // dust drift
  const dp=dust.geometry.attributes.position.array; for(let i=0;i<dustN;i++){ dp[i*3+1]+=dt*0.25; if(dp[i*3+1]>16)dp[i*3+1]=0; } dust.geometry.attributes.position.needsUpdate=true; dust.rotation.y+=dt*0.01;
  // keep contact shadows under the characters
  for(let i=0;i<shadowed.length;i++){ shadows[i].position.x=shadowed[i].position.x; shadows[i].position.z=shadowed[i].position.z; }
  // focus camera
  if(focus){ controls.target.lerp(new THREE.Vector3(focus.pos.x*0.6,1.4,focus.pos.z*0.6),0.05);
    const want=new THREE.Vector3(focus.pos.x*1.5,6,focus.pos.z*1.5+8); camera.position.lerp(want,0.04); }
  controls.update();
  composer.render();
}
addEventListener('resize',()=>{ camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H()); composer.setSize(W(),H()); });
setTimeout(()=>{ const l=document.getElementById('loading'); if(l&&l.textContent==='WAKING THE LAB…')l.style.display='none'; }, 2500);
loop();
</script>
