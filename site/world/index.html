<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Chain — Dr. Mineral's living world (Phase 0)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=IBM+Plex+Mono:wght@400;500&family=Spectral:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#0a0807;overflow:hidden;font-family:'Spectral',serif;color:#efe3cf}
  #app{position:fixed;inset:0}
  .label{position:absolute;transform:translate(-50%,-100%);pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    color:#f3e6cf;background:rgba(12,9,7,.55);border:1px solid var(--c,rgba(210,170,110,.4));border-radius:999px;padding:5px 12px;white-space:nowrap;
    box-shadow:0 0 16px -4px var(--c,#0000);backdrop-filter:blur(4px);transition:opacity .2s}
  .label b{color:var(--c,#f0c87e)}
  .label small{display:block;color:rgba(214,199,170,.65);letter-spacing:.1em;font-size:9px;margin-top:1px}
  #hud{position:fixed;top:20px;left:22px;z-index:5;pointer-events:none}
  #hud .kick{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.34em;color:rgba(238,196,126,.8)}
  #hud h1{margin:6px 0 0;font-family:'Cinzel',serif;font-weight:700;font-size:clamp(22px,3vw,34px);color:#f6e9d0;letter-spacing:.04em;text-shadow:0 0 30px rgba(245,196,107,.4)}
  #hud .sub{margin-top:6px;font-style:italic;color:rgba(214,199,170,.7);font-size:14px}
  #ctr{position:fixed;top:22px;right:24px;z-index:5;text-align:right;font-family:'IBM Plex Mono',monospace}
  #ctr .lab{font-size:10px;letter-spacing:.24em;color:rgba(238,196,126,.75)}
  #ctr .n{font-size:34px;color:#f6c878;text-shadow:0 0 22px rgba(246,196,112,.6);line-height:1}
  #ctr .sub{font-size:10px;letter-spacing:.14em;color:rgba(200,182,150,.6);margin-top:3px}
  #hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:5;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:rgba(214,190,150,.55)}
  #tag{position:fixed;bottom:16px;right:18px;z-index:5;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;color:rgba(200,182,150,.4)}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;background:#0a0807;color:#f0c87e;font-family:'IBM Plex Mono',monospace;letter-spacing:.2em;font-size:12px}
</style>
</head>
<body>
<div id="loading">DESCENDING INTO THE CHAIN…</div>
<div id="app"></div>
<div id="labels"></div>
<div id="hud">
  <div class="kick">THE DR. MINERAL UNIVERSE</div>
  <h1>THE CHAIN</h1>
  <div class="sub">a living blockchain-mining world &middot; Phase&nbsp;0</div>
</div>
<div id="ctr">
  <div class="lab">BLOCKS MINED</div>
  <div class="n" id="blocks">0</div>
  <div class="sub" id="chainlen">CHAIN LENGTH 0</div>
</div>
<div id="hint">DRAG TO ORBIT &middot; SCROLL TO ZOOM &middot; THE WORLD IS WORKING</div>
<div id="tag">PHASE 0 PROTOTYPE &middot; BILLBOARD SPRITES STAND IN FOR 3D MODELS</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app = document.getElementById('app');
const W = () => window.innerWidth, H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(W(), H()); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0807);
scene.fog = new THREE.FogExp2(0x0b0907, 0.030);

const camera = new THREE.PerspectiveCamera(48, W()/H(), 0.1, 200);
camera.position.set(13, 10, 15);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 7; controls.maxDistance = 34;
controls.maxPolarAngle = Math.PI * 0.49;
controls.autoRotate = true; controls.autoRotateSpeed = 0.35;

// ---------- lighting ----------
scene.add(new THREE.HemisphereLight(0x4a3a2a, 0x070504, 0.55));
const amber = new THREE.DirectionalLight(0xffd28a, 0.5); amber.position.set(6,12,4); scene.add(amber);

// ---------- ground (cavern floor) ----------
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(20, 64),
  new THREE.MeshStandardMaterial({ color:0x231a13, roughness:1, metalness:0 })
);
floor.rotation.x = -Math.PI/2; scene.add(floor);
// a darker rim ring
const rim = new THREE.Mesh(new THREE.RingGeometry(19.4, 20, 64),
  new THREE.MeshBasicMaterial({ color:0x0c0907, side:THREE.DoubleSide }));
rim.rotation.x = -Math.PI/2; rim.position.y = 0.01; scene.add(rim);

// ---------- zones ----------
const ZONES = [
  { key:'mines',   name:'THE MINES',   sub:'mining · proof of work', pos:new THREE.Vector3(-8,0,4),  c:0xb98cff },
  { key:'foundry', name:'THE FOUNDRY', sub:'forge the block',        pos:new THREE.Vector3(0,0,7),   c:0xf2902e },
  { key:'ledger',  name:'THE LEDGER',  sub:'the chain of trust',     pos:new THREE.Vector3(8,0,4),   c:0x9fc6e8 },
  { key:'vault',   name:'THE VAULT',   sub:'treasury of value',      pos:new THREE.Vector3(0,0,-8),  c:0x6fd0ff },
  { key:'watch',   name:'THE WATCH',   sub:'secure the chain',       pos:new THREE.Vector3(8,0,-4),  c:0xe2603a },
];
const labelEl = {};
const labelBox = document.getElementById('labels');
ZONES.forEach(z=>{
  // platform
  const plat = new THREE.Mesh(
    new THREE.CylinderGeometry(2.4,2.7,0.5,32),
    new THREE.MeshStandardMaterial({ color:0x2c2118, roughness:.9 })
  );
  plat.position.copy(z.pos); plat.position.y = 0.25; scene.add(plat);
  // glow light
  const pl = new THREE.PointLight(z.c, 14, 16, 2); pl.position.copy(z.pos); pl.position.y = 2.4; scene.add(pl);
  z.light = pl;
  // HTML label
  const d = document.createElement('div'); d.className='label';
  d.style.setProperty('--c', '#'+z.c.toString(16).padStart(6,'0'));
  d.innerHTML = `<b>${z.name}</b><small>${z.sub}</small>`;
  labelBox.appendChild(d); labelEl[z.key] = d;
});
const Z = k => ZONES.find(z=>z.key===k);

// zone props ----------------------------------------------------
function crystal(x,z,col,h){
  const m = new THREE.Mesh(new THREE.OctahedronGeometry(h,0),
    new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:.9, roughness:.3, metalness:.2 }));
  m.position.set(x, h*0.9, z); m.rotation.y=Math.random()*3; scene.add(m); return m;
}
// Mines: a cluster of crystals
const mp = Z('mines').pos;
for(let i=0;i<6;i++){ const a=i/6*6.28; crystal(mp.x+Math.cos(a)*1.3, mp.z+Math.sin(a)*1.3, 0xb98cff, 0.5+Math.random()*0.5); }
crystal(mp.x, mp.z, 0xd9b3ff, 1.0);
// Foundry: glowing forge ring
const fp = Z('foundry').pos;
const forge = new THREE.Mesh(new THREE.TorusGeometry(1.3,0.34,16,40),
  new THREE.MeshStandardMaterial({ color:0xff8a2a, emissive:0xff7a18, emissiveIntensity:1.4, roughness:.4 }));
forge.position.set(fp.x,1.3,fp.z); forge.rotation.x=Math.PI/2; scene.add(forge);
const forgeLight = new THREE.PointLight(0xff8a2a, 22, 14, 2); forgeLight.position.set(fp.x,1.6,fp.z); scene.add(forgeLight);
// Ledger: tall glowing pillar + star
const lp = Z('ledger').pos;
const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,4,12),
  new THREE.MeshStandardMaterial({ color:0x9fc6e8, emissive:0x6fa8d8, emissiveIntensity:.8 }));
pillar.position.set(lp.x,2,lp.z); scene.add(pillar);
const star = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4,0),
  new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xbfe0ff, emissiveIntensity:1.6 }));
star.position.set(lp.x,4.3,lp.z); scene.add(star);
// Vault: blue crystal on pedestal
const vp = Z('vault').pos;
const ped = new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.9,1,16), new THREE.MeshStandardMaterial({color:0x2a2118,roughness:.9}));
ped.position.set(vp.x,0.75,vp.z); scene.add(ped);
const seed = crystal(vp.x,vp.z,0x6fd0ff,0.7); seed.position.y=1.7;
// Watch: vertical eye-ring
const wp = Z('watch').pos;
const eye = new THREE.Mesh(new THREE.TorusGeometry(0.9,0.16,12,32),
  new THREE.MeshStandardMaterial({color:0xe2603a,emissive:0xe2603a,emissiveIntensity:1}));
eye.position.set(wp.x,1.8,wp.z); scene.add(eye);
const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.32,16,16),
  new THREE.MeshStandardMaterial({color:0xffcaa0,emissive:0xff9a60,emissiveIntensity:1.2}));
pupil.position.set(wp.x,1.8,wp.z); scene.add(pupil);

// ---------- the growing CHAIN (Foundry -> Ledger) ----------
const chainGroup = new THREE.Group(); scene.add(chainGroup);
const chainMat = new THREE.MeshStandardMaterial({ color:0xf6c878, emissive:0xe0a23a, emissiveIntensity:1.1, metalness:.6, roughness:.3 });
const CHAIN_MAX = 16;
function addLink(){
  if(chainGroup.children.length >= CHAIN_MAX) return;
  const i = chainGroup.children.length;
  const t = i/(CHAIN_MAX-1);
  const p = new THREE.Vector3().lerpVectors(fp, lp, t*0.95);
  const link = new THREE.Mesh(new THREE.TorusGeometry(0.34,0.12,10,20), chainMat);
  link.position.set(p.x, 1.0, p.z);
  link.rotation.x = Math.PI/2; link.rotation.z = (i%2)*Math.PI/2;
  link.scale.setScalar(0.01); link.userData.born = clock.getElapsedTime();
  chainGroup.add(link);
  updateHud();
}

// ---------- billboard character sprites ----------
function makeSprite(url, h){
  const mat = new THREE.SpriteMaterial({ transparent:true, depthWrite:false });
  const sp = new THREE.Sprite(mat); sp.scale.set(h*0.5, h, 1);
  new THREE.TextureLoader().load(url, tex=>{
    tex.colorSpace = THREE.SRGBColorSpace; mat.map = tex; mat.needsUpdate = true;
    sp.scale.set(h * (tex.image.width/tex.image.height), h, 1);
  });
  sp.userData.h = h; scene.add(sp); return sp;
}
const HERO = '../../assets/keyed/char-drmineral-hero-v1.png';
const MINER = '../../assets/keyed/char-tally-v1.png';
const drM = makeSprite(HERO, 3.4); drM.position.set(0, 1.7, 0);     // overseeing at center
const miner = makeSprite(MINER, 2.2);                                // works the loop
// the crystal the miner hauls
const haul = new THREE.Mesh(new THREE.OctahedronGeometry(0.32,0),
  new THREE.MeshStandardMaterial({color:0xd9b3ff,emissive:0xb98cff,emissiveIntensity:1}));
haul.visible = false; scene.add(haul);

// ---------- HUD ----------
let blocks = 0;
function updateHud(){
  document.getElementById('blocks').textContent = blocks;
  document.getElementById('chainlen').textContent = 'CHAIN LENGTH ' + chainGroup.children.length;
}

// project a 3D point to screen px
const v = new THREE.Vector3();
function place(el, world, yOff){
  v.copy(world); v.y += yOff; v.project(camera);
  const behind = v.z > 1;
  el.style.opacity = behind ? 0 : 1;
  el.style.left = ((v.x*0.5+0.5)*W()) + 'px';
  el.style.top  = ((-v.y*0.5+0.5)*H()) + 'px';
}

// ---------- mining loop ----------
const clock = new THREE.Clock();
let phase = 0, prevSeg = 0;
addLink(); // seed the genesis link

function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  // miner walks mine -> foundry -> mine
  phase += dt * 0.32;
  const seg = phase % 2;
  const carrying = seg < 1;
  const from = carrying ? mp : fp, to = carrying ? fp : mp;
  const f = carrying ? seg : seg-1;
  miner.position.lerpVectors(from, to, f);
  miner.position.y = miner.userData.h/2 + Math.sin(t*3)*0.05;
  // arrival at foundry => forge a block
  if(prevSeg < 1 && seg >= 1){ blocks++; addLink(); }
  prevSeg = seg;
  // haul crystal while carrying
  haul.visible = carrying;
  haul.position.set(miner.position.x+0.5, 1.1+Math.sin(t*3)*0.05, miner.position.z);
  haul.rotation.y += dt*2;

  // Dr. Mineral gentle bob
  drM.position.y = drM.userData.h/2 + 0.05 + Math.sin(t*1.5)*0.05;

  // animated props
  forge.rotation.z += dt*0.6; forgeLight.intensity = 18 + Math.sin(t*4)*6;
  star.rotation.y += dt*1.2; star.position.y = 4.3 + Math.sin(t*2)*0.15;
  seed.rotation.y += dt*0.8; eye.rotation.z += dt*0.5;
  ZONES.forEach((z,i)=> z.light.intensity = 12 + Math.sin(t*2 + i)*3 );
  // chain links pop in + shimmer
  chainGroup.children.forEach((lnk)=>{
    const age = t - lnk.userData.born;
    const s = Math.min(1, age*4); lnk.scale.setScalar(0.4 + s*0.6*0.9 + 0.36);
    lnk.material; // shared
  });

  controls.update();
  renderer.render(scene, camera);

  // labels
  ZONES.forEach(z => place(labelEl[z.key], z.pos, 3.2));
  requestAnimationFrame(animate);
}

addEventListener('resize', ()=>{ camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H()); });

// hide loader once the hero texture is in (or after a beat)
setTimeout(()=>{ document.getElementById('loading').style.display='none'; }, 600);
updateHud();
animate();
</script>
</body>
</html>
